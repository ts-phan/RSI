<style>
  :root {
    --bg: #0A1120;
    --panel: #111B2E;
    --grid: #1E2A42;
    --line: #2A3B57;
    --ink: #E9EEF7;
    --ink-dim: #8593AD;
    --steel: #7FB3E8;
    --signal: #3DDC97;
    --amber: #FFA94D;
    --alert: #FF6B4A;
    --violet: #B79CFB;
  }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background-image:
      linear-gradient(rgba(127,179,232,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,179,232,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
  }
  .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; letter-spacing: -0.01em; }
  .mono-num { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .eyebrow {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--grid);
    border-radius: 14px;
    box-shadow: 0 1px 0 rgba(127,179,232,0.05) inset, 0 20px 40px -28px rgba(0,0,0,0.75);
  }
  input[type="number"], select {
    background: #0D1626; color: var(--ink);
  }
  input[type="number"]:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--steel); outline-offset: 1px;
  }
  input[type="range"] { accent-color: var(--steel); }
  /* Interrupteurs style "control panel" a la place des cases a cocher natives */
  input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 34px; height: 20px; border-radius: 999px;
    background: #1B2740; border: 1px solid var(--line);
    position: relative; cursor: pointer; flex: none;
    transition: background 0.15s ease;
  }
  input[type="checkbox"]::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 999px;
    background: var(--ink-dim); transition: transform 0.15s ease, background 0.15s ease;
  }
  input[type="checkbox"]:checked::after { transform: translateX(14px); background: #0A1120; }
  input[type="checkbox"].accent-\[\#7FB3E8\]:checked { background: var(--steel); }
  input[type="checkbox"].accent-\[\#FFA94D\]:checked { background: var(--amber); }
  input[type="checkbox"].accent-\[\#3DDC97\]:checked { background: var(--signal); }
  input[type="checkbox"].accent-\[\#B79CFB\]:checked { background: var(--violet); }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .status-dot { animation: pulse-dot 2s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .status-dot { animation: none; } }

  /* Vue scindee : la config reste compacte et scrollable en haut, les resultats occupent le
     reste de l'ecran et defilent independamment - on garde graphiques + KPI visibles sans
     avoir a re-scroller toute la page a chaque changement de curseur. */
  html, body { height: 100%; overflow: hidden; }
  .app-shell { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  .pane-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .pane-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .pane-scroll::-webkit-scrollbar-track { background: transparent; }
  .pane-scroll::-webkit-scrollbar-thumb { background: #2A3B57; border-radius: 8px; }
  .pane-scroll { scrollbar-width: thin; scrollbar-color: #2A3B57 transparent; }
</style>
</head>
